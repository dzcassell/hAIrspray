<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ai-spray — control panel</title>
<style>
  :root {
    --bg:          #0a0a0c;
    --panel:       #141417;
    --panel-2:     #1b1b1f;
    --border:      #2a2a30;
    --border-hi:   #3d3d44;
    --text:        #e4e4e7;
    --muted:       #8a8a92;
    --dim:         #5d5d66;
    --accent:      #f59e0b;       /* amber — TX */
    --accent-dim:  #78510a;
    --ok:          #22c55e;
    --warn:        #eab308;
    --err:         #ef4444;
    --info:        #60a5fa;

    --cat-llm_api:       #60a5fa;
    --cat-chatbot_ui:    #a78bfa;
    --cat-media_gen:     #f472b6;
    --cat-aggregator:    #22d3ee;
    --cat-real_response: #f59e0b;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); }
  body {
    font: 14px/1.5 ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    min-height: 100vh;
  }
  code, .mono { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; }
  a { color: var(--info); }

  /* Layout */
  header {
    display: flex; align-items: center; gap: 16px;
    padding: 12px 20px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 10;
  }
  header .title {
    font-weight: 700; font-size: 18px; letter-spacing: 0.02em;
  }
  header .title .accent { color: var(--accent); }
  header .spacer { flex: 1; }

  .banner {
    padding: 8px 20px;
    background: #2a1a05;
    color: #fcd34d;
    border-bottom: 1px solid #3a2409;
    font-size: 13px;
  }
  .banner strong { color: #fde68a; }

  main {
    padding: 20px;
    display: grid; gap: 20px;
    grid-template-columns: minmax(280px, 1fr) minmax(360px, 2fr);
    max-width: 1600px; margin: 0 auto;
  }
  main > .full { grid-column: 1 / -1; }
  @media (max-width: 900px) {
    main { grid-template-columns: 1fr; }
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
  }
  .panel .head {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
    font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--muted);
  }
  .panel .head .grow { flex: 1; }
  .panel .body { padding: 14px; }

  /* Status pill */
  .pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 3px 10px; border-radius: 999px;
    font-size: 12px; font-weight: 600; letter-spacing: 0.04em;
    border: 1px solid var(--border-hi); background: var(--panel-2);
  }
  .pill .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--dim);
    box-shadow: 0 0 0 0 rgba(0,0,0,0);
  }
  .pill.tx { color: var(--accent); border-color: var(--accent-dim); }
  .pill.tx .dot {
    background: var(--accent);
    box-shadow: 0 0 8px rgba(245,158,11,0.6);
    animation: pulse 1.6s ease-in-out infinite;
  }
  .pill.standby { color: var(--muted); }
  @keyframes pulse {
    0%,100% { opacity: 1; }
    50%     { opacity: 0.35; }
  }

  .pill.live { color: var(--ok); border-color: #124019; }
  .pill.live .dot { background: var(--ok); box-shadow: 0 0 6px rgba(34,197,94,0.6); }
  .pill.dead { color: var(--err); border-color: #401414; }
  .pill.dead .dot { background: var(--err); }

  /* Buttons */
  .btn {
    appearance: none; border: 1px solid var(--border-hi);
    background: var(--panel-2); color: var(--text);
    padding: 6px 12px; border-radius: 4px;
    font: inherit; cursor: pointer;
    transition: background 80ms, border-color 80ms;
  }
  .btn:hover:not(:disabled) { background: #23232a; border-color: #4a4a54; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn.primary { background: var(--accent); color: #1a0f00; border-color: var(--accent); font-weight: 600; }
  .btn.primary:hover:not(:disabled) { background: #ffb02b; }
  .btn.danger  { background: #2a0f0f; border-color: #5a1a1a; color: #fca5a5; }
  .btn.danger:hover:not(:disabled) { background: #401515; }
  .btn.small { padding: 3px 8px; font-size: 12px; }

  /* Stats */
  .stats-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
  }
  .stat {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px 12px;
  }
  .stat .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .stat .value { font-size: 22px; font-weight: 700; margin-top: 2px; }
  .stat.ok  .value { color: var(--ok); }
  .stat.err .value { color: var(--err); }

  .cat-bars { margin-top: 12px; display: flex; flex-direction: column; gap: 6px; }
  .cat-bar {
    display: grid; grid-template-columns: 110px 1fr 44px;
    align-items: center; gap: 8px;
    font-size: 12px;
  }
  .cat-bar .name { color: var(--muted); font-family: ui-monospace, monospace; }
  .cat-bar .track { height: 6px; background: var(--panel-2); border-radius: 3px; overflow: hidden; }
  .cat-bar .fill { height: 100%; background: var(--info); }
  .cat-bar .count { text-align: right; color: var(--muted); font-variant-numeric: tabular-nums; }

  /* Config */
  .row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .row label.key { flex: 0 0 130px; color: var(--muted); font-size: 13px; }
  .row input[type="number"] {
    background: var(--panel-2); border: 1px solid var(--border);
    border-radius: 4px; color: var(--text); padding: 5px 8px; width: 80px;
    font: inherit;
  }
  .row input[type="range"] { flex: 1; accent-color: var(--accent); }
  .row .readout { color: var(--accent); font-variant-numeric: tabular-nums; min-width: 56px; text-align: right; font-weight: 600; }
  .checkbox-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 6px 12px;
    margin-top: 4px;
  }
  .checkbox-grid label {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 10px; background: var(--panel-2);
    border: 1px solid var(--border); border-radius: 4px;
    cursor: pointer; user-select: none; font-size: 13px;
  }
  .checkbox-grid input { accent-color: var(--accent); }
  .toast {
    font-size: 12px; color: var(--ok); margin-left: auto; opacity: 0;
    transition: opacity 200ms;
  }
  .toast.show { opacity: 1; }

  /* Category pill */
  .cat {
    display: inline-block; font-size: 11px; font-weight: 600;
    padding: 1px 7px; border-radius: 3px; letter-spacing: 0.02em;
    background: #23232a; color: #bbb;
    font-family: ui-monospace, monospace;
  }
  .cat.llm_api       { background: #0f1d30; color: var(--cat-llm_api); }
  .cat.chatbot_ui    { background: #18122b; color: var(--cat-chatbot_ui); }
  .cat.media_gen     { background: #2a0f1f; color: var(--cat-media_gen); }
  .cat.aggregator    { background: #0b262b; color: var(--cat-aggregator); }
  .cat.real_response { background: #2a1a05; color: var(--cat-real_response); }

  /* Status pill (HTTP status) */
  .st { display: inline-block; font-family: ui-monospace, monospace; font-size: 11px; font-weight: 600; padding: 1px 6px; border-radius: 3px; min-width: 30px; text-align: center; }
  .st.s-2 { background: #0f2a17; color: var(--ok); }
  .st.s-3 { background: #0d1d33; color: var(--info); }
  .st.s-4 { background: #2a2205; color: var(--warn); }
  .st.s-5 { background: #2a0f0f; color: var(--err); }
  .st.s-x { background: #23232a; color: var(--muted); }

  /* Targets table */
  .targets-controls {
    display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
    padding: 10px 14px; border-bottom: 1px solid var(--border); background: var(--panel-2);
  }
  .targets-controls input[type="text"], .targets-controls select {
    background: var(--panel); border: 1px solid var(--border);
    color: var(--text); border-radius: 4px; padding: 5px 8px; font: inherit;
  }
  .targets-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .targets-table th {
    text-align: left; font-weight: 600; font-size: 11px;
    color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em;
    padding: 8px 14px; border-bottom: 1px solid var(--border);
    background: var(--panel-2); position: sticky; top: 0;
  }
  .targets-table td {
    padding: 6px 14px; border-bottom: 1px solid #1e1e22;
    vertical-align: middle;
  }
  .targets-table tr:hover td { background: #17171b; }
  .targets-table td.name { font-weight: 500; }
  .targets-table td.url { color: var(--muted); font-family: ui-monospace, monospace; font-size: 12px; max-width: 420px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .targets-table td.count { text-align: right; font-variant-numeric: tabular-nums; color: var(--muted); }
  .targets-table td.actions { text-align: right; white-space: nowrap; }
  .targets-scroll { max-height: 440px; overflow-y: auto; }

  /* Toggle switch */
  .sw { position: relative; display: inline-block; width: 34px; height: 18px; }
  .sw input { opacity: 0; width: 0; height: 0; }
  .sw .slider {
    position: absolute; inset: 0; background: #2a2a30;
    border: 1px solid #3a3a42; border-radius: 999px;
    transition: background 120ms;
  }
  .sw .slider::before {
    content: ""; position: absolute; left: 2px; top: 1px;
    width: 12px; height: 12px; border-radius: 50%;
    background: var(--muted); transition: transform 120ms, background 120ms;
  }
  .sw input:checked + .slider { background: rgba(245,158,11,0.25); border-color: var(--accent-dim); }
  .sw input:checked + .slider::before { transform: translateX(16px); background: var(--accent); }

  /* Log */
  .log-controls {
    display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
    padding: 10px 14px; border-bottom: 1px solid var(--border); background: var(--panel-2);
  }
  .log-controls input[type="text"], .log-controls select {
    background: var(--panel); border: 1px solid var(--border);
    color: var(--text); border-radius: 4px; padding: 5px 8px; font: inherit;
  }
  #log {
    height: 440px; overflow-y: auto;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 12.5px;
    background: #07070a;
  }
  .log-row {
    display: grid;
    grid-template-columns: 90px 200px 110px 50px 44px 1fr;
    gap: 10px;
    padding: 3px 14px;
    border-bottom: 1px solid #111116;
    align-items: baseline;
  }
  .log-row:hover { background: #0e0e13; }
  .log-row .ts { color: var(--dim); }
  .log-row .target { color: var(--text); }
  .log-row .method { color: var(--muted); font-size: 11px; }
  .log-row .source { color: var(--dim); font-size: 11px; font-style: italic; }
  .log-row .msg { color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .log-row.err .msg { color: #fca5a5; }
  .log-row.ok  .msg { color: #a7f3d0; }

  /* Tiny helpers */
  .sep { color: var(--dim); }
  .fade { opacity: 0.6; }
</style>
</head>
<body>

<header>
  <div class="title">ai-<span class="accent">spray</span></div>
  <span id="status-pill" class="pill standby"><span class="dot"></span><span class="label">STANDBY</span></span>
  <button id="pause-btn" class="btn">Pause</button>
  <span class="spacer"></span>
  <span id="stream-pill" class="pill dead" title="SSE connection"><span class="dot"></span><span class="label">stream</span></span>
  <span class="mono fade" id="uptime">uptime: —</span>
</header>

<div class="banner">
  ⚠ <strong>No authentication</strong> — bind on loopback or keep this behind your SASE fabric. Do not expose to the public internet.
</div>

<main>

  <section class="panel" id="stats-panel">
    <div class="head">Stats <span class="grow"></span><span class="mono fade" id="tick-age">—</span></div>
    <div class="body">
      <div class="stats-grid">
        <div class="stat"><div class="label">Total</div><div class="value" id="stat-total">0</div></div>
        <div class="stat ok"><div class="label">OK</div><div class="value" id="stat-ok">0</div></div>
        <div class="stat err"><div class="label">Errors</div><div class="value" id="stat-err">0</div></div>
      </div>
      <div class="cat-bars" id="cat-bars"></div>
    </div>
  </section>

  <section class="panel" id="config-panel">
    <div class="head">
      Config <span class="grow"></span>
      <span class="toast" id="config-toast">saved</span>
    </div>
    <div class="body">

      <div class="row">
        <label class="key">min interval</label>
        <input type="range" id="cfg-min" min="0" max="600" step="1">
        <span class="readout"><span id="cfg-min-v">—</span>s</span>
      </div>
      <div class="row">
        <label class="key">max interval</label>
        <input type="range" id="cfg-max" min="0" max="600" step="1">
        <span class="readout"><span id="cfg-max-v">—</span>s</span>
      </div>
      <div class="row">
        <label class="key">burst prob.</label>
        <input type="range" id="cfg-bp" min="0" max="100" step="1">
        <span class="readout"><span id="cfg-bp-v">—</span>%</span>
      </div>
      <div class="row">
        <label class="key">burst size</label>
        <input type="number" id="cfg-bmin" min="1" max="99">
        <span class="sep">→</span>
        <input type="number" id="cfg-bmax" min="1" max="99">
      </div>
      <div class="row">
        <label class="key">burst gap</label>
        <input type="number" id="cfg-bgmin" min="0" max="60" step="0.5">
        <span class="sep">→</span>
        <input type="number" id="cfg-bgmax" min="0" max="60" step="0.5">
        <span class="readout">s</span>
      </div>

      <div style="margin-top: 14px;">
        <div class="label" style="font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px;">Categories</div>
        <div class="checkbox-grid" id="cat-checks"></div>
      </div>

    </div>
  </section>

  <section class="panel full" id="targets-panel">
    <div class="head">Targets <span class="grow"></span><span class="mono fade" id="targets-summary">—</span></div>
    <div class="targets-controls">
      <input type="text" id="tgt-search" placeholder="filter by name or URL…" style="flex: 1 1 220px;">
      <select id="tgt-cat">
        <option value="">all categories</option>
      </select>
      <select id="tgt-shown">
        <option value="all">all</option>
        <option value="enabled">enabled only</option>
        <option value="disabled">disabled only</option>
      </select>
      <button class="btn small" id="tgt-enable-all">Enable all</button>
      <button class="btn small" id="tgt-disable-all">Disable all</button>
    </div>
    <div class="targets-scroll">
      <table class="targets-table">
        <thead>
          <tr>
            <th style="width: 44px;">on</th>
            <th>name</th>
            <th>category</th>
            <th>method</th>
            <th>url</th>
            <th style="text-align:right;">hits</th>
            <th style="text-align:right;">last</th>
            <th style="text-align:right;">fire</th>
          </tr>
        </thead>
        <tbody id="tgt-body"></tbody>
      </table>
    </div>
  </section>

  <section class="panel full" id="log-panel">
    <div class="head">Live log <span class="grow"></span><span class="mono fade" id="log-count">0 events</span></div>
    <div class="log-controls">
      <input type="text" id="log-search" placeholder="filter…" style="flex: 1 1 220px;">
      <select id="log-cat"><option value="">all categories</option></select>
      <select id="log-status">
        <option value="">all statuses</option>
        <option value="2">2xx</option>
        <option value="3">3xx</option>
        <option value="4">4xx</option>
        <option value="5">5xx</option>
        <option value="err">transport errors</option>
      </select>
      <label style="display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);">
        <input type="checkbox" id="log-scroll" checked> auto-scroll
      </label>
      <button class="btn small" id="log-clear">Clear</button>
      <button class="btn small" id="log-export">Export NDJSON</button>
    </div>
    <div id="log"></div>
  </section>

</main>

<script>
(() => {
"use strict";

// ---------- tiny DOM helpers ----------
const $  = (sel) => document.querySelector(sel);
const $$ = (sel) => Array.from(document.querySelectorAll(sel));
const el = (tag, attrs={}, children=[]) => {
  const n = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs)) {
    if (k === "class") n.className = v;
    else if (k === "dataset") Object.assign(n.dataset, v);
    else if (k.startsWith("on")) n.addEventListener(k.slice(2), v);
    else n.setAttribute(k, v);
  }
  for (const c of [].concat(children)) {
    if (c == null) continue;
    n.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  }
  return n;
};
const fmtHms = (secs) => {
  secs = Math.floor(secs);
  const h = Math.floor(secs/3600), m = Math.floor((secs%3600)/60), s = secs%60;
  return (h ? h+"h " : "") + (h||m ? m.toString().padStart(2,"0")+"m " : "") + s.toString().padStart(2,"0")+"s";
};
const tsFmt = (t) => {
  const d = new Date(t*1000);
  return d.toTimeString().slice(0,8);
};
const statusClass = (code, ok) => {
  if (code == null) return "s-x";
  const c = Math.floor(code/100);
  return "s-" + c;
};

const ALL_CATEGORIES = ["llm_api","chatbot_ui","media_gen","aggregator","real_response"];

// ---------- state ----------
let S = {
  config: null,
  targets: [],
  stats: null,
  events: [],                 // kept for export
  eventsMaxKeep: 2000,
  logFilters: { q: "", cat: "", status: "" },
  tgtFilters: { q: "", cat: "", shown: "all" },
  autoScroll: true,
  paused: false,
};

// ---------- HTTP ----------
const apiGet  = (path) => fetch(path).then(r => r.json());
const apiSend = (path, method="POST", body=null) =>
  fetch(path, {
    method,
    headers: body ? {"Content-Type": "application/json"} : {},
    body: body ? JSON.stringify(body) : undefined,
  }).then(r => r.json());

// ---------- rendering: stats ----------
function renderStats() {
  if (!S.stats) return;
  $("#stat-total").textContent = S.stats.total_requests.toLocaleString();
  $("#stat-ok").textContent    = S.stats.total_ok.toLocaleString();
  $("#stat-err").textContent   = S.stats.total_errors.toLocaleString();

  $("#uptime").textContent =
    "uptime: " + fmtHms(S.stats.uptime_seconds) +
    " · " + S.stats.enabled_targets + "/" + S.stats.total_targets + " targets";

  $("#tick-age").textContent =
    S.stats.last_tick_seconds_ago == null
      ? "no events yet"
      : "last " + fmtHms(S.stats.last_tick_seconds_ago) + " ago";

  // Per-category bars
  const bars = $("#cat-bars");
  bars.innerHTML = "";
  const total = Math.max(1, S.stats.total_requests);
  for (const cat of ALL_CATEGORIES) {
    const n = S.stats.per_category[cat] || 0;
    const pct = (n / total) * 100;
    const track = el("div", {class:"track"}, [
      el("div", {class:"fill"})
    ]);
    track.firstChild.style.width = pct.toFixed(1) + "%";
    track.firstChild.style.background = `var(--cat-${cat})`;
    bars.appendChild(el("div", {class:"cat-bar"}, [
      el("span", {class:"name"}, cat),
      track,
      el("span", {class:"count"}, String(n)),
    ]));
  }

  // TX/STANDBY pill
  const pill = $("#status-pill");
  if (S.stats.scheduler_running) {
    pill.className = "pill tx";
    pill.querySelector(".label").textContent = "TX";
    $("#pause-btn").textContent = "Pause";
  } else {
    pill.className = "pill standby";
    pill.querySelector(".label").textContent = "STANDBY";
    $("#pause-btn").textContent = "Resume";
  }
}

// ---------- rendering: config ----------
function renderConfig() {
  if (!S.config) return;
  const c = S.config;
  $("#cfg-min").value = c.min_interval;       $("#cfg-min-v").textContent = c.min_interval;
  $("#cfg-max").value = c.max_interval;       $("#cfg-max-v").textContent = c.max_interval;
  $("#cfg-bp").value  = Math.round(c.burst_probability*100);
  $("#cfg-bp-v").textContent = Math.round(c.burst_probability*100);
  $("#cfg-bmin").value = c.burst_min_size;
  $("#cfg-bmax").value = c.burst_max_size;
  $("#cfg-bgmin").value = c.burst_gap_min;
  $("#cfg-bgmax").value = c.burst_gap_max;

  const box = $("#cat-checks");
  if (!box.childElementCount) {
    for (const cat of ALL_CATEGORIES) {
      const id = "catchk-" + cat;
      box.appendChild(el("label", {for: id}, [
        el("input", {type:"checkbox", id, "data-cat": cat}),
        el("span", {class:"cat "+cat}, cat),
      ]));
    }
    box.addEventListener("change", onCategoryChange);
  }
  for (const cat of ALL_CATEGORIES) {
    $("#catchk-"+cat).checked = c.categories.includes(cat);
  }
}

// ---------- rendering: targets ----------
function populateCategoryDropdowns() {
  for (const selId of ["#tgt-cat", "#log-cat"]) {
    const sel = $(selId);
    const have = new Set(Array.from(sel.options).map(o => o.value));
    for (const cat of ALL_CATEGORIES) {
      if (have.has(cat)) continue;
      sel.appendChild(el("option", {value:cat}, cat));
    }
  }
}

function renderTargets() {
  const body = $("#tgt-body");
  body.innerHTML = "";
  const { q, cat, shown } = S.tgtFilters;
  const qLower = q.trim().toLowerCase();

  let visible = 0, totalEnabled = 0;
  for (const t of S.targets) {
    if (t.enabled) totalEnabled++;
    if (cat && t.category !== cat) continue;
    if (shown === "enabled"  && !t.enabled) continue;
    if (shown === "disabled" &&  t.enabled) continue;
    if (qLower && !(t.name.toLowerCase().includes(qLower) || (t.url||"").toLowerCase().includes(qLower))) continue;

    visible++;
    const tr = el("tr");
    tr.dataset.name = t.name;

    // Toggle
    const cb = el("input", {type:"checkbox"});
    cb.checked = t.enabled;
    cb.addEventListener("change", () => toggleTarget(t.name, cb.checked));
    const sw = el("label", {class:"sw"}, [ cb, el("span",{class:"slider"}) ]);
    tr.appendChild(el("td", {}, sw));

    tr.appendChild(el("td", {class:"name"}, t.name));
    tr.appendChild(el("td", {}, el("span",{class:"cat "+t.category}, t.category)));
    tr.appendChild(el("td", {class:"mono fade"}, t.method || "GET"));
    tr.appendChild(el("td", {class:"url", title:t.url||""}, t.url||""));
    tr.appendChild(el("td", {class:"count"}, String(t.count)));

    const last = el("td", {class:"count"});
    if (t.last_status != null) {
      last.appendChild(el("span", {class:"st "+statusClass(t.last_status)}, String(t.last_status)));
    } else {
      last.appendChild(el("span", {class:"st s-x"}, "—"));
    }
    tr.appendChild(last);

    const fireBtn = el("button", {class:"btn small", title:"fire one request now"}, "fire");
    fireBtn.addEventListener("click", () => fireTarget(t.name, fireBtn));
    tr.appendChild(el("td", {class:"actions"}, fireBtn));

    body.appendChild(tr);
  }

  $("#targets-summary").textContent =
    `showing ${visible}/${S.targets.length} · ${totalEnabled} enabled`;
}

// ---------- rendering: log ----------
function logPasses(ev) {
  const { q, cat, status } = S.logFilters;
  if (cat && ev.category !== cat) return false;
  if (status === "err" && ev.status != null) return false;
  if (status && status !== "err") {
    if (ev.status == null) return false;
    if (Math.floor(ev.status/100) !== Number(status)) return false;
  }
  if (q) {
    const hay = [ev.target, ev.url, ev.error, ev.snippet].filter(Boolean).join(" ").toLowerCase();
    if (!hay.includes(q.toLowerCase())) return false;
  }
  return true;
}

function appendLogRow(ev) {
  if (!logPasses(ev)) return;
  const row = el("div", {class: "log-row " + (ev.ok ? "ok" : "err")});
  row.appendChild(el("span", {class:"ts"}, tsFmt(ev.ts || Date.now()/1000)));
  row.appendChild(el("span", {class:"target"}, ev.target || "—"));
  row.appendChild(el("span", {}, el("span", {class:"cat "+ev.category}, ev.category || "?")));
  row.appendChild(el("span", {class:"method"}, ev.method || ""));
  const st = el("span", {class:"st "+statusClass(ev.status)}, ev.status == null ? "—" : String(ev.status));
  row.appendChild(st);
  const msgBits = [];
  if (ev.error) msgBits.push(ev.error);
  else if (ev.snippet) msgBits.push(ev.snippet);
  if (ev.source && ev.source !== "scheduler") msgBits.push("("+ev.source+")");
  row.appendChild(el("span", {class:"msg"}, msgBits.join(" ")));

  const log = $("#log");
  log.appendChild(row);

  // Trim the DOM to keep things responsive
  while (log.childElementCount > 500) log.removeChild(log.firstChild);

  if (S.autoScroll) log.scrollTop = log.scrollHeight;
  $("#log-count").textContent = log.childElementCount + " shown · " + S.events.length + " buffered";
}

function rerenderLog() {
  $("#log").innerHTML = "";
  for (const ev of S.events.slice(-500)) appendLogRow(ev);
}

// ---------- actions ----------
async function refreshStatus() {
  try {
    const data = await apiGet("/api/status");
    S.stats = data;
    S.config = data.config;
    renderStats();
    renderConfig();
  } catch (e) { /* keep going */ }
}
async function refreshTargets() {
  try {
    S.targets = await apiGet("/api/targets");
    renderTargets();
  } catch (e) { /* ignore */ }
}

async function toggleTarget(name, enabled) {
  try {
    const r = await apiSend(`/api/targets/${encodeURIComponent(name)}/toggle`, "POST", {enabled});
    const t = S.targets.find(x => x.name === name);
    if (t) t.enabled = r.enabled;
    renderTargets();
    refreshStatus();
  } catch (e) {}
}
async function fireTarget(name, btn) {
  btn.disabled = true; btn.textContent = "…";
  try {
    await apiSend(`/api/targets/${encodeURIComponent(name)}/fire`, "POST");
  } catch (e) {}
  setTimeout(() => { btn.disabled = false; btn.textContent = "fire"; }, 600);
}
async function bulkEnable(flag) {
  await Promise.all(S.targets.map(t =>
    apiSend(`/api/targets/${encodeURIComponent(t.name)}/toggle`, "POST", {enabled: flag})
  ));
  refreshTargets(); refreshStatus();
}
async function togglePause() {
  if (S.stats && S.stats.scheduler_running) await apiSend("/api/scheduler/pause");
  else                                      await apiSend("/api/scheduler/resume");
  refreshStatus();
}

let configDebounce = null;
function patchConfig(changes) {
  clearTimeout(configDebounce);
  configDebounce = setTimeout(async () => {
    try {
      const r = await apiSend("/api/config", "PATCH", changes);
      S.config = r.config;
      const t = $("#config-toast");
      t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), 900);
    } catch (e) {}
  }, 200);
}

function onCategoryChange(e) {
  if (e.target.tagName !== "INPUT") return;
  const checked = $$("#cat-checks input:checked").map(i => i.dataset.cat);
  patchConfig({categories: checked});
}

// ---------- SSE ----------
let evtSrc = null;
function connectStream() {
  if (evtSrc) evtSrc.close();
  evtSrc = new EventSource("/api/events/stream");
  evtSrc.onopen = () => setStreamPill(true);
  evtSrc.onerror = () => setStreamPill(false);
  evtSrc.onmessage = (e) => {
    try {
      const ev = JSON.parse(e.data);
      // Dedupe when the stream replays recent history on reconnect: if the
      // incoming event's ts equals the last one we saw with the same target,
      // drop it.
      const last = S.events[S.events.length-1];
      if (last && last.ts === ev.ts && last.target === ev.target) return;
      S.events.push(ev);
      if (S.events.length > S.eventsMaxKeep) S.events.splice(0, S.events.length - S.eventsMaxKeep);
      appendLogRow(ev);
      // Update per-target last status in our local cache
      const t = S.targets.find(x => x.name === ev.target);
      if (t) {
        t.count = (t.count || 0) + 1;
        t.last_status = ev.status;
        // Only rerender the relevant cells to avoid reshuffling rows on scroll
        const row = $(`#tgt-body tr[data-name="${CSS.escape(ev.target)}"]`);
        if (row) {
          row.children[5].textContent = t.count;
          const lastTd = row.children[6];
          lastTd.innerHTML = "";
          const sp = el("span", {class:"st "+statusClass(ev.status)}, ev.status == null ? "—" : String(ev.status));
          lastTd.appendChild(sp);
        }
      }
    } catch {}
  };
}
function setStreamPill(live) {
  const p = $("#stream-pill");
  p.className = "pill " + (live ? "live" : "dead");
  p.querySelector(".label").textContent = live ? "stream" : "no stream";
}

// ---------- wire up ----------
function bindConfigControls() {
  const bind = (id, parse, field, readoutId, fmt) => {
    const input = $("#"+id);
    input.addEventListener("input", () => {
      const v = parse(input.value);
      if (readoutId) $("#"+readoutId).textContent = fmt ? fmt(v) : v;
      patchConfig({[field]: v});
    });
  };
  bind("cfg-min",   Number, "min_interval",     "cfg-min-v");
  bind("cfg-max",   Number, "max_interval",     "cfg-max-v");
  bind("cfg-bp",    v => Number(v)/100, "burst_probability", "cfg-bp-v",
       v => Math.round(v*100));
  bind("cfg-bmin",  Number, "burst_min_size");
  bind("cfg-bmax",  Number, "burst_max_size");
  bind("cfg-bgmin", Number, "burst_gap_min");
  bind("cfg-bgmax", Number, "burst_gap_max");
}

function bindTargetControls() {
  $("#tgt-search").addEventListener("input", e => { S.tgtFilters.q = e.target.value; renderTargets(); });
  $("#tgt-cat").addEventListener("change", e => { S.tgtFilters.cat = e.target.value; renderTargets(); });
  $("#tgt-shown").addEventListener("change", e => { S.tgtFilters.shown = e.target.value; renderTargets(); });
  $("#tgt-enable-all").addEventListener("click", () => bulkEnable(true));
  $("#tgt-disable-all").addEventListener("click", () => bulkEnable(false));
}
function bindLogControls() {
  $("#log-search").addEventListener("input", e => { S.logFilters.q = e.target.value; rerenderLog(); });
  $("#log-cat").addEventListener("change",  e => { S.logFilters.cat = e.target.value; rerenderLog(); });
  $("#log-status").addEventListener("change", e => { S.logFilters.status = e.target.value; rerenderLog(); });
  $("#log-scroll").addEventListener("change", e => { S.autoScroll = e.target.checked; });
  $("#log-clear").addEventListener("click", () => {
    $("#log").innerHTML = ""; S.events = []; $("#log-count").textContent = "0 events";
  });
  $("#log-export").addEventListener("click", () => {
    const ndjson = S.events.map(e => JSON.stringify(e)).join("\n");
    const blob = new Blob([ndjson], {type: "application/x-ndjson"});
    const url = URL.createObjectURL(blob);
    const a = el("a", {href:url, download: "ai-spray-events-" + Date.now() + ".ndjson"});
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 0);
  });
}

$("#pause-btn").addEventListener("click", togglePause);

async function boot() {
  populateCategoryDropdowns();
  bindConfigControls();
  bindTargetControls();
  bindLogControls();
  await refreshStatus();
  await refreshTargets();
  connectStream();
  // Periodic refresh for stats + target counts (covers missed SSE events).
  setInterval(refreshStatus, 2500);
  setInterval(refreshTargets, 10000);
}
boot();

})();
</script>
