services:
  hairspray:
    build: .
    image: hairspray:latest
    container_name: hairspray
    restart: unless-stopped
    env_file:
      - .env
    ports:
      # LAN-accessible by default so the web UI is reachable from
      # workstations on the same network. Override HEALTH_BIND in .env
      # with 127.0.0.1 if you want loopback-only. HEALTH_HOST_PORT
      # defaults to 8090 because 8080 is commonly taken (cadvisor).
      - "${HEALTH_BIND:-0.0.0.0}:${HEALTH_HOST_PORT:-8090}:8080"
    volumes:
      # Persistent API key store for keyed prompt providers. Lives in
      # a named Docker volume so it survives container rebuilds. File
      # inside is plaintext JSON with mode 0600 — see app/keys.py.
      #
      # The volume name is kept as 'ai-spray-keys' for upgrade
      # compatibility: renaming it would orphan any keys you already
      # saved under the old project name.
      - ai-spray-keys:/data
      # Extra CA certificates — primarily for SASE / NGFW deployments
      # where outbound HTTPS is decrypted and re-signed by a fabric
      # (Cato, Zscaler, Palo Alto, Netskope, etc.). Drop the fabric's
      # re-sign root CA (as a .crt or .pem file) into the host-side
      # ./certs/ directory; main.py picks it up at boot and combines
      # it with certifi's Mozilla bundle. With the CA trusted this
      # way, full TLS verification stays ON and TLS_VERIFY can stay
      # at its default. Read-only mount — container never writes back.
      - ./certs:/etc/ssl/hairspray-extra-ca:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    # Optional: pin DNS to your Cato-facing resolver so DNS flows also
    # traverse the SASE fabric.
    # dns:
    #   - 192.168.40.1

volumes:
  ai-spray-keys:
